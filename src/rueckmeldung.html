<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Rückmeldung zur Webseite">
    <link rel="stylesheet" href="index.css">
    <title>Rückmeldung Lionel Messi</title>
</head>
<body class="body">
    <header class="header">
        <h1>Rückmeldung</h1>
    </header>
    <nav class="navbar">
        <a href="../index.html" class="navlink">Home</a>    
        <a href="rueckmeldung.html" class="navlink">Rückmeldung</a>
        <a href="achivements.html" class="navlink">Achivements</a>
        <a href="highlights.html" class="navlink">Highlights</a>
    </nav>
    <main class="main">
        <h2>Kontaktformular</h2>
        <form method="post">
            <label>Anrede *</label> <br>

            <input type="radio" name="anrede" id="frau" placeholder="Frau" required>
            <label for="frau">Frau</label>

            <input type="radio" name="anrede" id="herr" placeholder="Herr" required>
            <label for="herr">Herr</label>

            <input type="radio" name="anrede" id="divers" placeholder="Divers" required>
            <label for="divers">Divers</label><br><br>

            <label for="firstname">Vorname *</label><br>
            <input type="text" name="firstname" id="firstname" placeholder="Vorname" required><br><br>

            <label for="lastname">Nachname *</label><br>
            <input type="text" name="lastname" id="lastname" placeholder="Nachname" required><br><br>

            <label for="email">E-Mail *</label><br>
            <input type="email" name="email" id="email" placeholder="example@example.com" required><br>

            <input type="submit" value="Absenden">
        </form>
    </main>
    <footer class="footer">
        <p>Developed by Noam Buess</p>
    </footer>
</body>
</html>
