    <main class="main">
        <h2 class="main-title">Log In</h2>
        <form method="post" action="https://gibm.becknet.ch/formular/formular.php" target="_blank">
            <label for="select">Anrede *</label> <br>
            <select id="select" class="input" name="anrede">
                <option id="Mann" value="Mann">Mann</option>
                <option id="Frau" value="Frau">Frau</option>
                <option id="Divers" value="Divers">Divers</option>
            </select> <br> <br>

            <label for="firstname">Vorname *</label><br>
            <input type="text" name="firstname" id="firstname" placeholder="Vorname" required autofocus class="input"><br><br>

            <label for="lastname">Nachname *</label><br>
            <input type="text" name="lastname" id="lastname" placeholder="Nachname" required class="input"><br><br>
            
            <label for="gebdate">Geburtsdatum *</label> <br>
            <input type="date" name="gebdate" id="gebdate" required class="input" min="1926-03-07" max="2026-03-07"> <br> <br>

            <label for="email">E-Mail *</label><br> 
            <input type="email" name="email" id="email" required placeholder="example@example.com" class="input"><br> <br>

            <label for="tel">Telefonnummer *</label> <br>
            <input type="tel" name="tel" id="tel" required class="input" minlength="10" maxlength="10" pattern="[0-9]*" title="bitte gültige nummer eingeben"> <br> <br>

            <label for="password">Passwort *</label> <br>
            <input type="password" name="password" id="password" required class="input" pattern=".{8,}" title="mind. 8 Buchstaben"> <br> <br>

            <input type="submit" value="Anmelden" class="input-submit">
            <input type="reset" value="Reset" class="input-submit">
            <br>
        </form>
    </main>
